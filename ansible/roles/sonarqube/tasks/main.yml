---
- name: Get IMDSv2 token
  uri:
    url: http://169.254.169.254/latest/api/token
    method: PUT
    headers:
      X-aws-ec2-metadata-token-ttl-seconds: "21600"
    return_content: yes
  register: imds_token

- name: Get AWS region from instance metadata
  uri:
    url: http://169.254.169.254/latest/meta-data/placement/region
    headers:
      X-aws-ec2-metadata-token: "{{ imds_token.content }}"
    return_content: yes
  register: aws_region_meta

- name: Fetch SonarQube DB username from SSM
  command: >
    aws ssm get-parameter
    --name "{{ sonar_db_username_ssm }}"
    --query Parameter.Value
    --output text
    --region {{ aws_region_meta.content }}
  register: sonar_db_user

- name: Fetch SonarQube DB password from SSM
  command: >
    aws ssm get-parameter
    --name "{{ sonar_db_password_ssm }}"
    --with-decryption
    --query Parameter.Value
    --output text
    --region {{ aws_region_meta.content }}
  register: sonar_db_pass
  no_log: true

# ── Kernel tuning ─────────────────────────────────────────────────────────────

- name: Set vm.max_map_count for SonarQube
  sysctl:
    name: vm.max_map_count
    value: '524288'
    state: present
    reload: yes

- name: Set fs.file-max for SonarQube
  sysctl:
    name: fs.file-max
    value: '131072'
    state: present
    reload: yes

- name: Set ulimits for SonarQube
  blockinfile:
    path: /etc/security/limits.conf
    block: |
      sonarqube   -   nofile   131072
      sonarqube   -   nproc    8192

# ── PostgreSQL ────────────────────────────────────────────────────────────────

- name: Install PostgreSQL
  apt:
    name: [postgresql, postgresql-contrib, python3-psycopg2]
    state: present
    update_cache: yes

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Create SonarQube PostgreSQL user
  become_user: postgres
  postgresql_user:
    name: "{{ sonar_db_user.stdout }}"
    password: "{{ sonar_db_pass.stdout }}"
    state: present

- name: Create SonarQube database
  become_user: postgres
  postgresql_db:
    name: "{{ sonar_db_name }}"
    owner: "{{ sonar_db_user.stdout }}"
    state: present

# ── SonarQube ─────────────────────────────────────────────────────────────────

- name: Create sonarqube system user
  user:
    name: sonarqube
    system: yes
    shell: /bin/bash
    create_home: yes

- name: Download SonarQube
  get_url:
    url: https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-10.6.0.92116.zip
    dest: /tmp/sonarqube.zip

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract SonarQube
  unarchive:
    src: /tmp/sonarqube.zip
    dest: /opt/
    remote_src: yes
    creates: /opt/sonarqube-10.6.0.92116

- name: Symlink SonarQube directory
  file:
    src: /opt/sonarqube-10.6.0.92116
    dest: /opt/sonarqube
    state: link
    owner: sonarqube
    group: sonarqube

- name: Set SonarQube directory ownership
  file:
    path: /opt/sonarqube-10.6.0.92116
    owner: sonarqube
    group: sonarqube
    recurse: yes

- name: Configure sonar.properties
  template:
    src: sonar.properties.j2
    dest: /opt/sonarqube/conf/sonar.properties
    owner: sonarqube
    group: sonarqube
    mode: '0640'

- name: Create SonarQube systemd service
  template:
    src: sonarqube.service.j2
    dest: /etc/systemd/system/sonarqube.service

- name: Enable and start SonarQube
  systemd:
    name: sonarqube
    enabled: yes
    state: started
    daemon_reload: yes
