plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  tag:Project: DevPulse
  instance-state-name: running

keyed_groups:
  - key: tags.Name
    separator: ""

compose:
  ansible_host: public_ip_address
  ansible_user: "'ubuntu'"
  ansible_ssh_private_key_file: "'~/.ssh/labs_kp.pem'"
  ansible_ssh_common_args: "'-o StrictHostKeyChecking=no'"
